# Generated by HyprMod

cursor:hide_on_key_press = 1
cursor:inactive_timeout = 0
decoration:active_opacity = 0.85
decoration:blur:brightness = 1.1
decoration:blur:contrast = 0.81
decoration:blur:enabled = 1
decoration:blur:ignore_opacity = 1
decoration:blur:passes = 3
decoration:blur:popups = 1
decoration:blur:size = 8
decoration:blur:xray = 1
decoration:inactive_opacity = 0.8
decoration:rounding = 25
decoration:rounding_power = 2.0
decoration:shadow:enabled = 0
decoration:shadow:range = 17
general:border_size = 0
general:col.active_border = 0xffb4befe 0xffcba6f7 0deg
general:col.inactive_border = 0xff1e1e2e 0deg
general:extend_border_grab_area = 15
general:gaps_in = 6
general:gaps_out = 12
general:resize_on_border = 0
general:snap:border_overlap = 1
general:snap:enabled = 1
general:snap:respect_gaps = 1
input:accel_profile = flat
misc:animate_manual_resizes = 1
misc:animate_mouse_windowdragging = 1
misc:key_press_enables_dpms = 1
misc:mouse_move_enables_dpms = 1
misc:vfr = 0

# Bezier curves
bezier = smoothIn, 0.25, 1.0, 0.5, 1.0

# Animations
animation = global, 1, 4.0, smoothIn
animation = layersIn, 1, 7.0, smoothIn, slide

# Monitors
monitor = DP-2, 2560x1440@180.00Hz, 0x0, 1, bitdepth, 10, cm, srgb

# Keybinds
unbind = SUPER, F
unbind = SUPER, Q
unbind = SUPER, E
unbind = SUPER SHIFT CTRL, bar
unbind = SUPER, Z
unbind = SUPER, X
bind = SUPER, U, exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = SUPER, Q, killactive,
bind = SUPER, E, exec, nautilus
bind = SUPER SHIFT CTRL, bar, exec, hyprctl setcursor Bibata-Modern-Ice 24
bind = SUPER, Z, exec, flatpak run com.plexamp.Plexamp
bind = SUPER, X, exec, steam
bind = SUPER, F, exec, librewolf
bind = SUPER, F11, fullscreen, 0
